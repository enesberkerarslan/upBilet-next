# Cloudflare arkasında: burada genelde 80 yeterli (Flexible) veya origin sertifikası ile 443 eklenir.
# DNS: api.upbilet.com ve admins.upbilet.com → sunucu IP (proxy açık).

upstream backend_api {
    server backend:3002;
}

upstream backoffice_app {
    server backoffice:3000;
}

upstream frontend_app {
    server frontend:3005;
}

server {
    listen 80;
    server_name api.upbilet.com;

    client_max_body_size 50m;

    location / {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name admins.upbilet.com;

    location / {
        proxy_pass http://backoffice_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Ziyaretçi sitesi (Next.js)
server {
    listen 80;
    server_name www.upbilet.com upbilet.com;

    location / {
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
