services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    restart: unless-stopped
    expose:
      - "3002"
    networks:
      - internal

  backoffice:
    build:
      context: ./backoffice
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.upbilet.com/api}
    environment:
      BACKEND_API_BASE_URL: ${BACKEND_API_BASE_URL:-https://api.upbilet.com/api}
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.upbilet.com/api}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-G-DNECS3XMVV}
    environment:
      # SSR / Route Handler: container içinden backend (tarayıcı hâlâ NEXT_PUBLIC_* kullanır)
      API_URL: ${FRONTEND_API_URL:-http://backend:3002/api}
    restart: unless-stopped
    expose:
      - "3005"
    networks:
      - internal

  nginx:
    image: nginx:alpine
    depends_on:
      - backend
      - backoffice
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
