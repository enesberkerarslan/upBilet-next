services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    restart: unless-stopped
    expose:
      - "3002"
    networks:
      - internal

  backoffice:
    build:
      context: ./backoffice
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.upbilet.com/api}
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - internal

  nginx:
    image: nginx:alpine
    depends_on:
      - backend
      - backoffice
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
